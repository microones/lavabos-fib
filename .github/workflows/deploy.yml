name: CI/CD Lavabos FIB

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # PRIMER PAS: Comprovar que el codi és correcte (s'executa sempre)
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies (app)
        run: bun install

      - name: Generate Prisma Client
        run: bun prisma generate

      - name: Create missing directories
        run: mkdir -p public/img

      - name: Build check (app)
        run: bun run build
        env:
          # Avis! Aquestes dades són fictícies (us ho juro)
          DATABASE_URL: "postgresql://microones:mmmmmmmmmmmmmmmm@localhost:5432/lavabos-fib"
          NEXT_PUBLIC_API_URL: "http://localhost:3001"
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}

      - name: Install dependencies (api)
        run: cd lavabos-fib-api && bun install

      - name: Build check (api)
        run: cd lavabos-fib-api && bun run build
        env:
          PHOTOS_DIR: "/tmp/photos"
          API_BASE_URL: "http://localhost:3001"
          NEXT_PUBLIC_API_BASE_URL: "http://localhost:3001"

# SEGON PAS: Desplegament real (NOMÉS si el primer pas és OK i estem a MAIN)
  deploy:
    needs: test-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Configurar l'entorn
            set -e
            export PATH=$PATH:/home/yerayzalaya/.bun/bin

            # 2. Entrar al directori i actualitzar codi
            cd /var/www/lavabos-fib
            git pull origin main
            bun install

            # 3. Base de dades
            bun prisma generate
            bun prisma migrate deploy

            # 4. Build de l'app principal (cal NEXT_PUBLIC_API_URL en build time)
            NEXT_PUBLIC_API_URL=https://api.lavabos-fib.microones.cat \
            API_URL=https://api.lavabos-fib.microones.cat \
            bun run build

            # 5. Reiniciar l'app principal amb PM2
            pm2 restart lavabos-fib || pm2 start "bun run start" --name "lavabos-fib"

            # 6. Build i reinici de la API de fotos
            cd /var/www/lavabos-fib/lavabos-fib-api
            bun install
            NEXT_PUBLIC_API_BASE_URL=https://api.lavabos-fib.microones.cat \
            API_BASE_URL=https://api.lavabos-fib.microones.cat \
            bun run build
            pm2 restart lavabos-fib-api || pm2 start "bun run start" --name "lavabos-fib-api"
